[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_pgsql",
  "php83Extensions.pdo_sqlite",
  "php83Extensions.mbstring",
  "php83Extensions.tokenizer",
  "php83Extensions.xml",
  "php83Extensions.ctype",
  "php83Extensions.curl",
  "php83Extensions.fileinfo",
  "php83Extensions.gd",
  "php83Extensions.zip",
  "php83Extensions.intl",
  "php83Extensions.bcmath",
  "nodejs_20",
  "nodePackages.npm",
]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
  "npm ci --prefer-offline",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan storage:link --force 2>/dev/null || true && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
